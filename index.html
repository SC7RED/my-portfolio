<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dennis Delenyan — Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Dennis Delenyan — computer engineering student building embedded systems and full-stack web projects."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#000000" />

    <link rel="canonical" href="https://dennis.delenyan.com/" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dennis.delenyan.com/" />
    <meta property="og:title" content="Dennis Delenyan — Portfolio" />
    <meta
      property="og:description"
      content="Computer engineering student building embedded systems and full-stack web projects."
    />
    <meta property="og:image" content="https://dennis.delenyan.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dennis Delenyan — Portfolio" />
    <meta
      name="twitter:description"
      content="Computer engineering student building embedded systems and full-stack web projects."
    />
    <meta name="twitter:image" content="https://dennis.delenyan.com/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          /* no localStorage — keep the default dark class from the markup */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
